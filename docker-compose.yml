version: "3.8"

services:

  # ── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: employee_db
    environment:
      POSTGRES_USER: employee_user
      POSTGRES_PASSWORD: employee_pass
      POSTGRES_DB: employee_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employee_user -d employee_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Application ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: employee_api
    environment:
      DATABASE_URL: postgresql://employee_user:employee_pass@db:5432/employee_db
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

# ── Volumes ───────────────────────────────────────────────
volumes:
  postgres_data:

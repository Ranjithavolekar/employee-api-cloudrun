name: Deploy Employee API to Cloud Run

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: ${{ secrets.CLOUD_RUN_SERVICE }}
  REGISTRY_URL: ${{ secrets.ARTIFACT_REGISTRY_URL }}
  IMAGE_NAME: ${{ secrets.ARTIFACT_REGISTRY_URL }}/employee-api

jobs:
  ci:
    name: CI — Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 \
            --show-source --statistics
          flake8 app/ --count --exit-zero \
            --max-complexity=10 --max-line-length=127 \
            --statistics

      - name: Build Docker image
        run: |
          docker build -t employee-api:${{ github.sha }} .
          echo "✅ Docker image built successfully!"

      - name: Verify container starts
        run: |
          docker run -d \
            --name test-container \
            -p 8080:8080 \
            -e DATABASE_URL="postgresql://test:test@localhost/test" \
            employee-api:${{ github.sha }} || true
          sleep 5
          docker logs test-container || true
          docker stop test-container || true
          echo "✅ Container verification complete!"

  cd:
    name: CD — Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev \
            --quiet
          echo "✅ Docker configured for Artifact Registry!"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          echo "✅ Docker image built!"

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
          echo "✅ Image pushed to Artifact Registry!"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=cloud-run-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:employee-api-db \
            --set-secrets=DATABASE_URL=employee-api-db-url:latest \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --port=8080 \
            --quiet
          echo "✅ Deployed to Cloud Run!"

      - name: Verify deployment health
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format="value(status.url)")
          echo "🚀 Service URL: $URL"
          sleep 10
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" $URL/health)
          if [ $RESPONSE -eq 200 ]; then
            echo "✅ Health check passed! App is live at $URL"
          else
            echo "❌ Health check failed with status: $RESPONSE"
            exit 1
          fi

      - name: Deployment Summary
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format="value(status.url)")
          echo "════════════════════════════════════"
          echo "✅ DEPLOYMENT SUCCESSFUL!"
          echo "════════════════════════════════════"
          echo "🌍 Service URL:  $URL"
          echo "📦 Image:        ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "🌿 Branch:       ${{ github.ref_name }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "════════════════════════════════════"